# pkgdown site configuration for https://teazrq.github.io/RLT/

url: https://teazrq.github.io/RLT/

template:
  bootstrap: 5
  bslib:
    preset: cosmo

navbar:
  type: default
  left:
    - text: "Get Started"
      href: articles/get-started.html
    - text: "Tutorials"
      menu:
        - text: "Regression"
          href: articles/regression-tutorial.html
        - text: "Classification"
          href: articles/classification-tutorial.html
        - text: "Survival"
          href: articles/survival-tutorial.html
        - text: "Survival Minimal"
          href: articles/survival-minimal.html
        - text: "Random Seed and Reproducibility"
          href: articles/feature-seed.html
        - text: "Variable Importance"
          href: articles/variable-importance.html
        - text: "Single Tree"
          href: articles/feature-single-tree.html
        - text: "Kernel"
          href: articles/feature-kernel.html
        - text: "Confidence Interval Estimation"
          href: articles/confidence-interval.html
        - text: "Reinforcement Splitting"
          href: articles/reinforcement-splitting.html
    - text: "Reference"
      href: reference/index.html
    - text: "Changelog"
      href: news/index.html
  right:
    - icon: fa-github fa-lg
      href: https://github.com/teazrq/RLT
      aria-label: GitHub

articles:
  - title: "Start Here"
    contents:
      - articles/get-started
  - title: "Core Tutorials"
    contents:
      - regression-tutorial
      - classification-tutorial
      - survival-tutorial
      - articles/survival-minimal
  - title: "Feature Guides"
    contents:
      - articles/feature-seed
      - articles/variable-importance
      - articles/feature-single-tree
      - articles/feature-kernel
      - articles/confidence-interval
      - articles/reinforcement-splitting

reference:
  - title: "Core Modeling Functions"
    desc: "Fit, predict, and print RLT models."
    contents:
      - RLT
      - predict.RLT
      - print.RLT

  - title: "Model Analysis and Utilities"
    desc: "Inspect fitted models, variable importance, kernels, and survival bands."
    contents:
      - importance
      - print.importance.RLT
      - forest.kernel
      - get.one.tree
      - get.surv.band
      - cindex
